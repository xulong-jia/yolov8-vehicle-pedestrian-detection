name: Python syntax check

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  py-compile:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python syntax check
        run: |
          python -m py_compile app.py src/train.py src/evaluate.py src/predict_image.py src/predict_video.py src/visualize_dataset.py src/analyze_dataset.py
